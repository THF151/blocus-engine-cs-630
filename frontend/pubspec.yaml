name: blocus_frontend
description: >-
  Flutter frontend for the Blokus board-game engine.
  Supports Classic (20x20, up to 4 players) and Duo (14x14, 2 players)
  modes with online multiplayer via WebSocket.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.6.3

  # State management (no code generation required)
  flutter_riverpod: ^2.6.1

  # Network - cross-platform WebSocket (Android / iOS / macOS / Windows)
  web_socket_channel: ^3.0.1

  # Persistence
  shared_preferences: ^2.3.5

  # Utilities
  uuid: ^4.5.1

  # UI / Animation
  flutter_animate: ^4.5.2
  gap: ^3.0.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
